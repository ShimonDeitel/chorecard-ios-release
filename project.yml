name: ChoreCard
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ChoreCard:
    type: application
    platform: iOS
    sources:
      - path: ChoreCard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chorecard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ChoreCard/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChoreCard/ChoreCard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ChoreCardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChoreCardTests
      - path: ChoreCard.storekit
    dependencies:
      - target: ChoreCard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.chorecard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ChoreCard:
    build:
      targets:
        ChoreCard: all
        ChoreCardTests: [test]
    run:
      config: Debug
      storeKitConfiguration: ChoreCard.storekit
    test:
      config: Debug
      storeKitConfiguration: ChoreCard.storekit
      targets:
        - ChoreCardTests
    archive:
      config: Release
